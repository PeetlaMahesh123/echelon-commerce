<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages - with /echelon-commerce/ base path
      var l = window.location;
      var basePath = '/echelon-commerce';
      
      // Remove the base path from pathname
      var pathWithoutBase = l.pathname.replace(basePath, '') || '/';
      
      // Redirect to the base path with the route as a query parameter
      var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        basePath + '/?redirect=' + encodeURIComponent(pathWithoutBase + l.search + l.hash);
      
      l.replace(redirectUrl);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
