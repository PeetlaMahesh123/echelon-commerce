    <script type="text/javascript">
      (function(l) {
        // Handle redirect from 404.html
        var redirectMatch = l.search.match(/[?&]redirect=([^&]+)/);
        if (redirectMatch) {
          var redirectPath = decodeURIComponent(redirectMatch[1]);
          window.history.replaceState(null, null, l.pathname + redirectPath);
        }
      }(window.location))
    </script>
