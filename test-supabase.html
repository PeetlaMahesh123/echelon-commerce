<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <div id="result">Testing...</div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://dqcxljpkrlbaolxbzmxe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxY3hsanBrcmxiYW9seGJ6bXhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzY3MDYsImV4cCI6MjA4OTI1MjcwNn0.hR0nMHHbg7Xz_cyD7HXRPAggmpy_FN6eySedGkBsN68';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    resultDiv.innerHTML = '<p style="color: red">Error: ' + error.message + '</p>';
                } else {
                    resultDiv.innerHTML = '<p style="color: green">Success! Found ' + data.length + ' products</p>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<p style="color: red">Connection failed: ' + err.message + '</p>';
            }
        }
        
        testConnection();
    </script>
</body>
</html>
